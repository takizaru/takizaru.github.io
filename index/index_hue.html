<script>
    (function() {
        // ========== ЗАДАНИЯ (с учётом правок пользователя) ==========
        const tasks = [
            { ru: "После того как я поел, я пошёл в школу.", solution: ["저", "는", "밥", "을", "먹은", "후에", "학교", "에", "갔어요"] },
            { ru: "После того как я посмотрел телевизор, я сделал домашнее задание.", solution: ["저", "는", "텔레비전", "을", "본", "다음에", "숙제", "를", "했어요"] },
            { ru: "После того как я прочитал книгу, я лёг спать.", solution: ["저", "는", "책", "을", "읽은", "뒤에", "잠", "을", "잤어요"] },
            { ru: "После того как я встретил друга, я пошёл в ресторан.", solution: ["저", "는", "친구", "를", "만난", "후에", "식당", "에", "갔어요"] },
            { ru: "После того как я спел песню, я станцевал.", solution: ["저", "는", "노래", "를", "한", "다음에", "춤", "을", "췄어요"] },
            { ru: "После того как я купил хлеб, я пошёл домой.", solution: ["저", "는", "빵", "을", "산", "뒤에", "집", "에", "갔어요"] },
            { ru: "После того как я написал письмо, я отправил его.", solution: ["저", "는", "편지", "를", "쓴", "후에", "보냈어요"] },
            { ru: "После того как я позавтракал, я почистил зубы.", solution: ["저", "는", "아침", "을", "먹은", "다음에", "이", "를", "닦았어요"] },
            { ru: "После того как я проснулся, я умылся.", solution: ["저", "는", "일어난", "뒤에", "세수", "를", "했어요"] },
            { ru: "После того как я выпил воду, я побежал.", solution: ["저", "는", "물", "을", "마신", "후에", "달렸어요"] },
            { ru: "После того как я купил билет, я пошёл в кино.", solution: ["저", "는", "표", "를", "산", "뒤에", "영화관", "에", "갔어요"] },
            { ru: "После того как я приготовил еду, я поел.", solution: ["저", "는", "음식", "을", "요리한", "후에", "밥", "을", "먹었어요"] },
            { ru: "После того как я выучил корейский, я поехал в Корею.", solution: ["저", "는", "한국어", "를", "배운", "다음에", "한국", "에", "갔어요"] },
            { ru: "После того как я позвонил маме, я вышел.", solution: ["저", "는", "어머니", "에게", "전화한", "뒤에", "나갔어요"] },
            { ru: "После того как я надел пальто, я вышел на улицу.", solution: ["저", "는", "외투", "를", "입은", "후에", "밖", "에", "나갔어요"] },
            { ru: "После того как я снял обувь, я вошёл в дом.", solution: ["저", "는", "신발", "을", "벗은", "다음에", "집", "에", "들어갔어요"] },
            { ru: "После того как я помыл руки, я поел.", solution: ["저", "는", "손", "을", "씻은", "뒤에", "밥", "을", "먹었어요"] },
            { ru: "После того как я вышел из автобуса, я пошёл пешком.", solution: ["저", "는", "버스", "에서", "내린", "다음에", "걸어갔어요"] },
            { ru: "После того как я сделал домашнюю работу, я поиграл.", solution: ["저", "는", "숙제", "를", "한", "뒤에", "놀았어요"] },
            { ru: "После того как я купил цветы, я подарил их.", solution: ["저", "는", "꽃", "을", "산", "후에", "선물했어요"] },
            { ru: "После того как я прочитал газету, я выпил кофе.", solution: ["저", "는", "신문", "을", "읽은", "다음에", "커피", "를", "마셨어요"] },
            { ru: "После того как я включил радио, я лёг спать.", solution: ["저", "는", "라디오", "를", "켠", "뒤에", "잤어요"] },
            { ru: "После того как я встретил учителя, я поздоровался.", solution: ["저", "는", "선생님", "을", "만난", "다음에", "인사했어요"] },
            { ru: "После того как я выучил слова, я сдал тест.", solution: ["저", "는", "단어", "를", "외운", "뒤에", "시험", "을", "봤어요"] },
            { ru: "После того как я сделал покупки, я пошёл домой.", solution: ["저", "는", "쇼핑", "을", "한", "다음에", "집", "에", "갔어요"] },
            { ru: "После того как я отдохнул, я почувствовал себя лучше.", solution: ["저", "는", "쉰", "뒤에", "기분", "이", "좋아졌어요"] }
        ];

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function hasBatchim(char) {
            if (!char) return false;
            const code = char.charCodeAt(0);
            if (code < 0xAC00 || code > 0xD7A3) return false;
            return (code - 0xAC00) % 28 !== 0;
        }

        function isParticle(text) {
            return ['는', '은', '가', '이', '를', '을', '도', '고', '으로', '로', '에', '에서', '에게'].includes(text);
        }

        function tokenizeSolution(solArray) {
            return solArray.map(item => {
                if (isParticle(item)) return { display: item, type: 'particle', isDict: false };
                return { display: item, type: 'word', isDict: false };
            });
        }

        // ========== СОСТОЯНИЕ ==========
        let taskOrder = [];
        let currentOrderIndex = 0;
        let builtBlocks = [];
        let availableElements = [];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initTaskOrder() {
            taskOrder = Array.from({ length: tasks.length }, (_, i) => i);
            taskOrder = shuffleArray(taskOrder);
            currentOrderIndex = 0;
        }

        function getCurrentTask() { return tasks[taskOrder[currentOrderIndex]]; }

        // ========== DOM ==========
        const buildArea = document.getElementById('buildArea');
        const elementsPanel = document.getElementById('elementsPanel');
        const russianTarget = document.getElementById('russianTarget');
        const progressDisplay = document.getElementById('progressDisplay');
        const feedbackDiv = document.getElementById('feedbackMessage');
        const playHintBtn = document.getElementById('playHintBtn');
        const resetBtn = document.getElementById('resetBtn');
        const checkBtn = document.getElementById('checkBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function getBlockClass(block) {
            if (block.isCombined) return 'mosaic-block combined';
            if (block.isDict) return 'mosaic-block dict-form';
            return 'mosaic-block';
        }
        function getElementClass(el) {
            if (el.type === 'predicate') return 'infinitive-chip';
            if (el.type === 'ending') return 'ending-chip';
            if (el.type === 'particle') return 'particle-chip';
            return '';
        }

        function renderBuildArea() {
            buildArea.innerHTML = '';
            builtBlocks.forEach((block, idx) => {
                const div = document.createElement('div');
                div.className = getBlockClass(block);
                div.textContent = block.display;
                div.setAttribute('data-index', idx);
                div.addEventListener('click', () => returnBlockToElements(idx));
                buildArea.appendChild(div);
            });
        }

        function renderElementsPanel() {
            elementsPanel.innerHTML = '';
            availableElements.forEach((el, idx) => {
                const chip = document.createElement('div');
                chip.className = 'element-chip ' + getElementClass(el);
                chip.textContent = el.display;
                chip.setAttribute('data-index', idx);
                chip.addEventListener('click', () => handleElementClick(idx));
                elementsPanel.appendChild(chip);
            });
        }

        function handleElementClick(elementIndex) {
            if (elementIndex < 0 || elementIndex >= availableElements.length) return;
            addElementToBuild(elementIndex);
        }

        function addElementToBuild(elementIndex) {
            if (elementIndex < 0 || elementIndex >= availableElements.length) return;
            const el = availableElements.splice(elementIndex, 1)[0];
            builtBlocks.push({ display: el.display, type: el.type, isDict: false, isCombined: false });
            renderBuildArea(); renderElementsPanel(); clearFeedback();
        }

        function returnBlockToElements(index) {
            if (index < 0 || index >= builtBlocks.length) return;
            const removed = builtBlocks.splice(index, 1)[0];
            availableElements.push({ display: removed.display, type: removed.type, isDict: false });
            availableElements = shuffleArray(availableElements);
            renderBuildArea(); renderElementsPanel(); clearFeedback();
        }

        function resetBuild() { loadCurrentTask(); }

        function checkAnswer() {
            const task = getCurrentTask();
            const solutionStr = task.solution.join('');
            const builtStr = builtBlocks.map(b => b.display).join('');
            if (solutionStr === builtStr) {
                showFeedback('✅ Отлично! Всё верно.', true);
                return true;
            } else {
                showFeedback('❌ Пока не совпадает. Попробуйте другую комбинацию.', false);
                return false;
            }
        }

        function showFeedback(msg, isCorrect) {
            feedbackDiv.style.display = 'block';
            feedbackDiv.textContent = msg;
            feedbackDiv.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
        }
        function clearFeedback() { feedbackDiv.style.display = 'none'; }

        function loadCurrentTask() {
            const task = getCurrentTask();
            russianTarget.textContent = task.ru;
            progressDisplay.textContent = `${currentOrderIndex + 1} / ${tasks.length}`;
            availableElements = shuffleArray(tokenizeSolution(task.solution));
            builtBlocks = [];
            renderBuildArea(); renderElementsPanel(); clearFeedback();
        }

        function navigateToNext() {
            if (currentOrderIndex < tasks.length - 1) { currentOrderIndex++; loadCurrentTask(); }
        }
        function navigateToPrev() {
            if (currentOrderIndex > 0) { currentOrderIndex--; loadCurrentTask(); }
        }

        function speakHint() {
            const task = getCurrentTask();
            const fullSentence = task.solution.join(' ');
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(fullSentence);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.4;
                utterance.pitch = 1.0;
                const voices = speechSynthesis.getVoices();
                const koVoice = voices.find(v => v.lang.startsWith('ko'));
                if (koVoice) utterance.voice = koVoice;
                speechSynthesis.speak(utterance);
            }
        }

        playHintBtn.addEventListener('click', speakHint);
        resetBtn.addEventListener('click', resetBuild);
        checkBtn.addEventListener('click', () => { if (checkAnswer()) setTimeout(navigateToNext, 900); });
        prevBtn.addEventListener('click', navigateToPrev);
        nextBtn.addEventListener('click', navigateToNext);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); navigateToPrev(); }
            else if (e.key === 'ArrowRight' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); navigateToNext(); }
            else if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); if (checkAnswer()) setTimeout(navigateToNext, 900); }
            else if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); resetBuild(); }
        });

        initTaskOrder();
        loadCurrentTask();
    })();
</script>
</body>
</html>
