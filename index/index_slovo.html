<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes, viewport-fit=cover">
  <title>✨ Фэнтези‑тренажёр корейских слов ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Sans+KR:wght@400;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #2b1b3a;
      background-image: radial-gradient(circle at 20% 30%, #3d2b52 5%, #1a0f26 90%);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      color: #f3e9c0;
    }

    .fantasy-world {
      max-width: 1100px;
      width: 100%;
      background: rgba(46, 27, 54, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 70px 70px 60px 60px;
      padding: 25px 25px 30px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), inset 0 0 40px rgba(255,215,150,0.3);
      border: 2px solid #dbb87c;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    .characters-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .fairy-box, .monster-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 240, 210, 0.15);
      border-radius: 80px;
      padding: 15px 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 25px rgba(255, 220, 140, 0.6);
      border: 1px solid #ffd78b;
      transition: transform 0.3s;
    }

    .fairy-box {
      background: linear-gradient(145deg, #f7e3c0 0%, #dbb87c 100%);
      border-color: #ffb347;
      color: #3b2b1f;
      box-shadow: 0 0 30px #f7b05e;
    }

    .monster-box {
      background: linear-gradient(145deg, #4a2c3b 0%, #2d1320 100%);
      border-color: #bc4a6b;
      box-shadow: 0 0 30px #a13d5a;
      color: #ffdab0;
    }

    canvas {
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff3d6, #b38b5b);
      box-shadow: 0 0 20px gold;
      width: 90px;
      height: 90px;
    }

    .monster-box canvas {
      background: radial-gradient(circle at 30% 30%, #6d3a4a, #2f1420);
      box-shadow: 0 0 25px #ff4466;
    }

    .name-tag {
      font-weight: 700;
      margin-top: 8px;
      font-size: 1.2rem;
      letter-spacing: 1px;
      font-family: 'Caveat', cursive;
    }

    .game-area {
      background: rgba(25, 14, 35, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 50px;
      padding: 20px 25px;
      border: 2px solid #b49466;
      box-shadow: inset 0 0 35px #000000;
    }

    .korean-word-display {
      height: 200px;
      background: #11091a;
      border-radius: 40px;
      margin: 10px 0 25px;
      position: relative;
      overflow: hidden;
      border: 3px solid #e6b87b;
      box-shadow: 0 0 40px #ba8b5a;
      background: radial-gradient(ellipse at center, #2c1d3a 0%, #0f0714 100%);
    }

    .falling-word {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 4rem;
      font-weight: 900;
      color: #ffecaa;
      text-shadow: 0 0 25px #fdaa4b, 0 0 50px #ff7700;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
      top: -80px;
      opacity: 0;
      transition: none;
      z-index: 20;
    }

    .flying-to-fairy {
      animation: flyToLeft 0.7s ease-in forwards !important;
      color: #f9ffb0 !important;
      text-shadow: 0 0 35px #fff5a3;
    }

    .flying-to-monster {
      animation: flyToRight 0.7s ease-in forwards !important;
      color: #ffadb9 !important;
      text-shadow: 0 0 30px #ff4466;
    }

    @keyframes flyToLeft {
      0% { transform: translateX(-50%) scale(1.2); opacity:1; }
      100% { transform: translate(-200px, -60px) scale(0.6); opacity:0; }
    }
    @keyframes flyToRight {
      0% { transform: translateX(-50%) scale(1.2); opacity:1; }
      100% { transform: translate(200px, -60px) scale(0.6); opacity:0; }
    }

    .options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin: 15px 0;
    }

    .option-btn {
      background: #fae3bc;
      border: 3px solid #b2823a;
      color: #3a2819;
      padding: 18px 22px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.2rem;
      cursor: pointer;
      background: linear-gradient(180deg, #ffefcf 0%, #e2b87a 100%);
      box-shadow: 0 8px 0 #845e32, 0 12px 22px black;
      transition: 0.1s linear;
      text-transform: uppercase;
      letter-spacing: 1px;
      min-width: 140px;
    }

    .option-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #5a3e1e, 0 8px 12px black;
    }

    .option-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .option-btn.correct-glow {
      background: #b7e9a0;
      border-color: #3c8527;
      box-shadow: 0 0 25px #7cf03c;
    }

    .option-btn.wrong-flash {
      background: #f4acac;
      border-color: #b52e2e;
      box-shadow: 0 0 20px #ff3a3a;
    }

    .control-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .score-box {
      background: #25172e;
      border-radius: 40px;
      padding: 12px 28px;
      font-weight: 700;
      font-size: 1.5rem;
      color: #f9e076;
      border: 1px solid gold;
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    .ctrl-btn {
      background: #3a284a;
      border: none;
      color: #ffdd99;
      font-size: 1.8rem;
      width: 60px;
      height: 60px;
      border-radius: 30px;
      cursor: pointer;
      background: #4f3765;
      box-shadow: 0 6px 0 #2a1738;
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #1c0f24;
    }

    /* Стили для навигации */
    .container {
      max-width: 1100px;
      width: 100%;
      margin-top: 10px;
    }

    .perehod {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding: 15px 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(46, 27, 54, 0.8);
      backdrop-filter: blur(15px);
      border: 2px solid #dbb87c;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,215,150,0.2);
      transition: all 0.3s ease;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,215,150,0.3) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .nav-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,215,150,0.4);
      border-color: #ffd78b;
      background: rgba(62, 38, 74, 0.9);
    }

    .nav-link:hover::before {
      opacity: 1;
    }

    .nav-link:active {
      transform: translateY(0);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,215,150,0.2);
      transition: all 0.1s ease;
    }

    .nav-link img {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 0 3px rgba(255,215,150,0.8));
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .nav-link:hover img {
      transform: scale(1.15);
      filter: drop-shadow(0 0 8px rgba(255,215,150,1));
    }

    /* ============================================
       АДАПТИВНОСТЬ ДЛЯ ВСЕХ ЭКРАНОВ
       ============================================ */

    /* Большие десктопы (1441px и выше) */
    @media (min-width: 1441px) {
      body {
        padding: 40px;
      }

      .fantasy-world {
        max-width: 1300px;
        padding: 35px 35px 40px;
        border-radius: 80px 80px 70px 70px;
        gap: 30px;
        margin-bottom: 40px;
      }

        padding: 20px 30px;
        border-radius: 100px;

        height: 110px;
      }

      }

      .score-box {

        font-size: 1.8rem;
        border-radius: 50px;
      }

      .ctrl-btn {
        width: 70px;

      }

      .nav-link {
        width: 70px;
        height: 70px;
      }

      .nav-link img {
        width: 32px;
        height: 32px;
      }

      .perehod {
        gap: 40px;
        padding: 20px 0;
      }
    }

    /* Стандартные десктопы (1025px - 1440px) */

      .fantasy-world {
        max-width: 1100px;

      }

        height: 180px;

        margin: 8px 0 20px;
      }

      .falling-word {
        font-size: 3.5rem;
      }

      .option-btn {
        padding: 15px 20px;
        font-size: 1.1rem;
        min-width: 130px;
      }

      .score-box {
        padding: 10px 22px;
        font-size: 1.3rem;
      }

      .ctrl-btn {
        width: 55px;
        height: 55px;

      }

      .nav-link {
        width: 55px;
        height: 55px;
      }

      .nav-link img {
        width: 25px;

      }

      .perehod {
        gap: 25px;
      }
    }

    /* Планшеты (481px - 768px) */
    @media (min-width: 481px) and (max-width: 768px) {

      }

      .fantasy-world {

      }

      }

      .falling-word {

      .options-grid {

      .option-btn {

      }

      .score-box {

      .nav-link {

      }

      }

      .perehod {

      }

      @keyframes flyToLeft {
        0% { transform: translateX(-50%) scale(1.1); opacity:1; }
        100% { transform: translate(-150px, -50px) scale(0.5); opacity:0; }
      }

        0% { transform: translateX(-50%) scale(1.1); opacity:1; }
        100% { transform: translate(150px, -50px) scale(0.5); opacity:0; }
      }
    }

    /* Большие телефоны (381px - 480px) */
    @media (min-width: 381px) and (max-width: 480px) {

        padding: 10px;
      }

      .fantasy-world {
        max-width: 100%;

        padding: 8px;
      }

      .fantasy-world {

        border-radius: 35px 35px 25px 25px;

    /* Очень маленькие экраны (250px - 320px) */

      body {
        padding: 5px;
      }

      .fantasy-world {
        max-width: 100%;
        padding: 10px 8px 12px;
        border-radius: 30px 30px 20px 20px;
        gap: 6px;

      }

      .name-tag {

      }

      .falling-word {

      }

      .options-grid {

      }

      .option-btn {

      .score-box {

      .btn-group {
        gap: 4px;

      .ctrl-btn {
        width: 32px;

      .nav-link {
        width: 32px;

        border-width: 1px;
      }

      .nav-link img {
        width: 15px;

      }

<script>
  (function() {
    // ----- ХОЛСТ: фея и монстр -----
    function drawFairy() {
      const canvas = document.getElementById('fairyCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 90;
      
      ctx.clearRect(0,0,size,size);
      ctx.save();
      ctx.scale(scale, scale);
      
      // Крылья
      ctx.fillStyle = '#fffde7';
      ctx.shadowColor = '#ffd966';
      ctx.shadowBlur = 10;
      ctx.beginPath(); 
      ctx.ellipse(30,50,12,18,0.2,0,Math.PI*2); 
      ctx.fill();
      ctx.beginPath(); 
      ctx.ellipse(60,50,12,18,-0.2,0,Math.PI*2); 
      ctx.fill();
      
      // Тело
      ctx.fillStyle = '#f5c6d0';
      ctx.shadowBlur = 12;
      ctx.beginPath(); 
      ctx.arc(45,58,12,0,Math.PI*2); 
      ctx.fill();
      
      // Голова
      ctx.fillStyle = '#ffe0bd';
      ctx.beginPath(); 
      ctx.arc(45,42,11,0,Math.PI*2); 
      ctx.fill();
      
      // Глаза
      ctx.fillStyle = '#1e1e1e';
      ctx.shadowBlur = 0;
      ctx.beginPath(); 
      ctx.arc(40,40,2,0,Math.PI*2); 
      ctx.fill();
      ctx.beginPath(); 
      ctx.arc(50,40,2,0,Math.PI*2); 
      ctx.fill();
      
      // Блики в глазах
      ctx.fillStyle = 'white'; 
      ctx.beginPath(); 
      ctx.arc(39,39,0.7,0,2*Math.PI); 
      ctx.fill();
      ctx.beginPath(); 
      ctx.arc(49,39,0.7,0,2*Math.PI); 
      ctx.fill();
      
      // Улыбка
      ctx.fillStyle = '#f06292'; 
      ctx.beginPath(); 
      ctx.arc(45,49,2.5,0,Math.PI); 
      ctx.fill();
      
      // Корона/ободок
      ctx.strokeStyle = '#c97d3c'; 
      ctx.lineWidth=2; 
      ctx.beginPath(); 
      ctx.arc(45,35,12,Math.PI,2*Math.PI); 
      ctx.stroke();
      
      ctx.restore();
    }

    function drawMonster() {
      const canvas = document.getElementById('monsterCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 90;
      
      ctx.clearRect(0,0,size,size);
      ctx.save();
      ctx.scale(scale, scale);
      
      // Тело
      ctx.fillStyle = '#3d1e2c';
      ctx.shadowColor = '#aa3355';
      ctx.shadowBlur = 12;
      ctx.beginPath(); 
      ctx.ellipse(45,62,18,20,0,0,Math.PI*2); 
      ctx.fill();
      
      // Голова
      ctx.fillStyle = '#4f2839';
      ctx.beginPath(); 
      ctx.arc(45,40,16,0,Math.PI*2); 
      ctx.fill();
      
      // Рога
      ctx.fillStyle = '#522e2e';
      ctx.shadowBlur = 8;
      ctx.beginPath(); 
      ctx.moveTo(32,28); 
      ctx.lineTo(25,13); 
      ctx.lineTo(38,26); 
      ctx.fill();
      ctx.beginPath(); 
      ctx.moveTo(58,28); 
      ctx.lineTo(65,13); 
      ctx.lineTo(52,26); 
      ctx.fill();
      
      // Глаза
      ctx.fillStyle = '#fafad2';
      ctx.shadowBlur = 0;
      ctx.beginPath(); 
      ctx.arc(38,38,5,0,Math.PI); 
      ctx.fill();
      ctx.beginPath(); 
      ctx.arc(52,38,5,0,Math.PI); 
      ctx.fill();
      
      // Зрачки
      ctx.fillStyle = '#c91b1b'; 
      ctx.beginPath(); 
      ctx.arc(38,39,2.5,0,Math.PI*2); 
      ctx.fill();
      ctx.beginPath(); 
      ctx.arc(52,39,2.5,0,Math.PI*2); 
      ctx.fill();
      
      // Зубы
      ctx.fillStyle = '#f0f0dd';
      ctx.beginPath(); 
      ctx.moveTo(38,50); 
      ctx.lineTo(42,58); 
      ctx.lineTo(46,50); 
      ctx.fill();
      ctx.beginPath(); 
      ctx.moveTo(48,50); 
      ctx.lineTo(52,58); 
      ctx.lineTo(56,50); 
      ctx.fill();
      
      ctx.restore();
    }

    // Адаптивный размер canvas
    function updateCanvasSizes() {
      const canvases = document.querySelectorAll('canvas');
      const width = window.innerWidth;
      
      canvases.forEach(canvas => {
        if (width <= 320) {
          canvas.width = canvas.height = 40;
        } else if (width <= 380) {
          canvas.width = canvas.height = 48;
        } else if (width <= 480) {
          canvas.width = canvas.height = 55;
        } else if (width <= 768) {
          canvas.width = canvas.height = 65;
        } else if (width <= 1024) {
          canvas.width = canvas.height = 75;
        } else if (width >= 1441) {
          canvas.width = canvas.height = 110;
        } else {
          canvas.width = canvas.height = 90;
        }
      });
      
      drawFairy();
      drawMonster();
    }

    window.addEventListener('resize', updateCanvasSizes);
    updateCanvasSizes();

    // ---------- ПОЛНЫЙ СЛОВАРЬ ----------

      {korean: "재미있다", russian: "интересный"}
    ];

    // ---------- ИГРОВЫЕ ПЕРЕМЕННЫЕ ----------
    let gameActive = false;
    let score = 0;
    
    let unlearnedWords = [...allKoreanWords];      
    let learnedWords = [];                         
    
    let currentWordData = null;
    let fallingElement = null;
    let fallTimeout = null;
    let wordFallingActive = false;

    const wordDisplay = document.getElementById('wordDisplay');
    const optionsContainer = document.getElementById('optionsContainer');
    const scoreSpan = document.getElementById('scoreValue');
    const startBtn = document.getElementById('startBtn');
    const soundBtn = document.getElementById('soundBtn');
    const resetBtn = document.getElementById('resetBtn');

    function updateScoreUI() {
      scoreSpan.textContent = score;
    }

    function clearFallingWord() {
      if (fallingElement) {
        fallingElement.remove();
        fallingElement = null;
      }
      if (fallTimeout) {
        clearTimeout(fallTimeout);
        fallTimeout = null;
      }
      wordFallingActive = false;
    }

    function stopGame() {
      gameActive = false;
      clearFallingWord();
      optionsContainer.innerHTML = '';
    }

    function getRandomOptions(correctRussian) {
      const others = allKoreanWords.filter(w => w.russian !== correctRussian).map(w => w.russian);
      const shuffled = others.sort(() => Math.random() - 0.5);
      const selected = [correctRussian, shuffled[0], shuffled[1]];
      return selected.sort(() => Math.random() - 0.5);
    }

    function createFallingWord(koreanText) {
      clearFallingWord();
      
      const wordDiv = document.createElement('div');
      wordDiv.className = 'falling-word';
      wordDiv.textContent = koreanText;
      wordDisplay.appendChild(wordDiv);
      fallingElement = wordDiv;
      
      requestAnimationFrame(() => {
        if (!fallingElement || !gameActive) return;
        
        fallingElement.style.top = '-80px';
        fallingElement.style.opacity = '1';
        fallingElement.style.transition = 'top 18s linear, opacity 0.5s';
        
        requestAnimationFrame(() => {
          if (!fallingElement || !gameActive) return;
          fallingElement.style.top = 'calc(100% - 70px)';
          wordFallingActive = true;
          
          fallTimeout = setTimeout(() => {
            if (gameActive && wordFallingActive && fallingElement) {
              handleWordMiss();
            }
          }, 18000);
        });
      });
    }

    function handleWordMiss() {
      if (!gameActive || !wordFallingActive || !currentWordData) return;
      
      wordFallingActive = false;
      clearTimeout(fallTimeout);
      
      if (!unlearnedWords.some(w => w.korean === currentWordData.korean)) {
        unlearnedWords.push(currentWordData);
      }
      
      if (fallingElement) {
        fallingElement.classList.add('flying-to-monster');
      }
      
      setTimeout(() => {
        clearFallingWord();
        if (gameActive) nextWord();
      }, 650);
    }

    function handleCorrect(selectedBtn) {
      if (!gameActive || !wordFallingActive || !currentWordData) return;
      
      wordFallingActive = false;
      clearTimeout(fallTimeout);
      
      score += 10;
      updateScoreUI();
      
      if (!learnedWords.some(w => w.korean === currentWordData.korean)) {
        learnedWords.push(currentWordData);
      }
      
      unlearnedWords = unlearnedWords.filter(w => w.korean !== currentWordData.korean);
      
      if (fallingElement) {
        fallingElement.style.transition = 'none';
        fallingElement.classList.add('flying-to-fairy');
      }
      
      selectedBtn.classList.add('correct-glow');
      
      setTimeout(() => {
        clearFallingWord();
        if (gameActive) nextWord();
      }, 700);
    }

    function handleIncorrect(selectedBtn, correctBtn) {
      if (!gameActive || !wordFallingActive || !currentWordData) return;
      
      wordFallingActive = false;
      clearTimeout(fallTimeout);
      
      if (!unlearnedWords.some(w => w.korean === currentWordData.korean)) {
        unlearnedWords.push(currentWordData);
      }
      
      if (fallingElement) {
        fallingElement.style.transition = 'none';
        fallingElement.classList.add('flying-to-monster');
      }
      
      selectedBtn.classList.add('wrong-flash');
      if (correctBtn) correctBtn.classList.add('correct-glow');
      
      setTimeout(() => {
        clearFallingWord();
        if (gameActive) nextWord();
      }, 750);
    }

    function renderOptions(wordData) {
      optionsContainer.innerHTML = '';
      const options = getRandomOptions(wordData.russian);
      
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.addEventListener('click', (e) => {
          if (!gameActive || !wordFallingActive || !currentWordData) return;
          
          const buttons = document.querySelectorAll('.option-btn');
          buttons.forEach(b => b.disabled = true);
          
          const correctButton = Array.from(buttons).find(b => b.textContent === currentWordData.russian);
          
          if (opt === currentWordData.russian) {
            handleCorrect(btn);
          } else {
            handleIncorrect(btn, correctButton);
          }
        });
        optionsContainer.appendChild(btn);
      });
    }

    function nextWord() {
      if (!gameActive) return;
      
      if (unlearnedWords.length === 0) {
        alert('🎉 Поздравляем! Вы выучили все слова! Нажмите "Сброс", чтобы начать заново.');
        stopGame();
        return;
      }
      
      const randomIndex = Math.floor(Math.random() * unlearnedWords.length);
      currentWordData = unlearnedWords[randomIndex];
      
      createFallingWord(currentWordData.korean);
      renderOptions(currentWordData);
    }

    function startGame() {
      if (gameActive) return;
      
      stopGame();
      
      if (unlearnedWords.length === 0 && learnedWords.length > 0) {
        unlearnedWords = [...allKoreanWords];
        learnedWords = [];
      }
      
      gameActive = true;
      score = 0;
      updateScoreUI();
      nextWord();
    }

    function resetGame() {
      stopGame();
      gameActive = false;
      score = 0;
      updateScoreUI();
      unlearnedWords = [...allKoreanWords];
      learnedWords = [];
      optionsContainer.innerHTML = '';
      clearFallingWord();
      currentWordData = null;
    }

    function speakWord() {
      if (!gameActive || !currentWordData) return;
      if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(currentWordData.korean);
        utterance.lang = 'ko-KR';
        utterance.rate = 0.85;
        speechSynthesis.speak(utterance);
      }
    }

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', resetGame);
    soundBtn.addEventListener('click', speakWord);

    resetGame();
    
    console.log('🎮 Игра готова! Нажмите 🚀 чтобы начать.');
  })();
