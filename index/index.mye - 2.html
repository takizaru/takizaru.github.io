            '운동하': { dict: '운동하다', combiningStem: '운동하' },
            '건강하': { dict: '건강하다', combiningStem: '건강하' },
            '감동적이': { dict: '감동적이다', combiningStem: '감동적이' },
            '부': { dict: '불다', combiningStem: '부' },
            '불': { dict: '불다', combiningStem: '불' },
            '들': { dict: '듣다', combiningStem: '들' },
            '쉬우': { dict: '쉽다', combiningStem: '쉬우' },
            '켜': { dict: '켜다', combiningStem: '켜' },
            '추우': { dict: '춥다', combiningStem: '추우' },
            '더우': { dict: '덥다', combiningStem: '더우' }
        };

        const manualBlockParse = {
            '춥니다': { stem: '추', ending: 'ㅂ니다', dict: '추다' },
            '붑니다': { stem: '부', ending: 'ㅂ니다', dict: '불다' },
            '마십니다': { stem: '마시', ending: 'ㅂ니다', dict: '마시다' },
            '예쁩니다': { stem: '예쁘', ending: 'ㅂ니다', dict: '예쁘다' },
            '옵니다': { stem: '오', ending: 'ㅂ니다', dict: '오다' },
            '부릅니다': { stem: '부르', ending: 'ㅂ니다', dict: '부르다' },
            '켭니다': { stem: '켜', ending: 'ㅂ니다', dict: '켜다' },
            '세웁니다': { stem: '세우', ending: 'ㅂ니다', dict: '세우다' },
            '흘립니다': { stem: '흘리', ending: 'ㅂ니다', dict: '흘리다' },
            '운동합니다': { stem: '운동하', ending: 'ㅂ니다', dict: '운동하다' },
            '이야기합니다': { stem: '이야기하', ending: 'ㅂ니다', dict: '이야기하다' },
            '건강합니다': { stem: '건강하', ending: 'ㅂ니다', dict: '건강하다' },
            '감동적입니다': { stem: '감동적이', ending: 'ㅂ니다', dict: '감동적이다' },
            '공부합니다': { stem: '공부하', ending: 'ㅂ니다', dict: '공부하다' },
            '여행합니다': { stem: '여행하', ending: 'ㅂ니다', dict: '여행하다' },
            '말합니다': { stem: '말하', ending: 'ㅂ니다', dict: '말하다' },
            '노래합니다': { stem: '노래하', ending: 'ㅂ니다', dict: '노래하다' },
            '돌봅니다': { stem: '돌보', ending: 'ㅂ니다', dict: '돌보다' },
            '조용합니다': { stem: '조용하', ending: 'ㅂ니다', dict: '조용하다' },
            '깨끗합니다': { stem: '깨끗하', ending: 'ㅂ니다', dict: '깨끗하다' }
        };

        function hasBatchim(char) {
            if (!char) return false;
            const code = char.charCodeAt(0);
            if (code < 0xAC00 || code > 0xD7A3) return false;
            return (code - 0xAC00) % 28 !== 0;
        }

        function canAttachEnding(stem, ending) {
            if (!stem || !ending) return false;
            const lastChar = stem[stem.length - 1];
            const batchim = hasBatchim(lastChar);
            if (ending === '며') return !batchim;
            if (ending === '으며') return batchim;
            if (ending === 'ㅂ니다') return !batchim;
            if (ending === '습니다') return batchim;
            return false;
        }

        function isEnding(text) {
            return ['며', '으며', '습니다', 'ㅂ니다'].includes(text);
        }

        function isParticle(text) {
            return ['는', '은', '가', '이', '를', '을', '도', '고', '으로', '로', '에', '에서'].includes(text);
        }

        function getStemMeta(stem) {
            if (stemMetaMap[stem]) return stemMetaMap[stem];
            if (/^[가-힣]+$/.test(stem) && stem.length >= 1) {
                return { dict: stem + '다', combiningStem: stem };
            }
            return null;
        }

        function attachFinalEnding(stem, ending) {
            if (ending === '습니다') return stem + ending;
            if (ending === 'ㅂ니다') {
                const meta = getStemMeta(stem);
                if (meta && meta.irregularFinal && meta.irregularFinal['ㅂ니다']) {
                    return meta.irregularFinal['ㅂ니다'];
                }
                const lastChar = stem[stem.length - 1];
                if (!hasBatchim(lastChar)) {
                    const code = lastChar.charCodeAt(0) - 0xAC00;
                    const onset = Math.floor(code / (21 * 28));
                    const vowel = Math.floor((code / 28) % 21);
                    const newSyllable = String.fromCharCode(0xAC00 + (onset * 21 * 28) + (vowel * 28) + 17);
                    return stem.slice(0, -1) + newSyllable + '니다';
                }
                return stem + ending;
            }
            return stem + ending;
        }

        function tokenizeSolution(solutionArray) {
            const tokens = [];
            solutionArray.forEach(block => {
                if (manualBlockParse[block]) {
                    const p = manualBlockParse[block];
                    tokens.push({ display: p.dict, type: 'predicate', combiningStem: p.stem, isDict: true });
                    tokens.push({ display: p.ending, type: 'ending', combiningStem: null, isDict: false });
                    return;
                }
                const parts = splitKoreanBlock(block);
                tokens.push(...parts);
            });
            return tokens;
        }

        function splitKoreanBlock(block) {
            const result = [];
            let remaining = block;
            const finalEndings = ['습니다', 'ㅂ니다', '입니다'];
            const connectingEndings = ['으며', '며'];
            const allParticles = ['는', '은', '가', '이', '를', '을', '도', '고', '으로', '로', '에', '에서'];

            let foundEnding = null;
            for (let end of finalEndings) {
                if (remaining.endsWith(end) && remaining.length > end.length) {
                    foundEnding = end;
                    remaining = remaining.slice(0, -end.length);
                    break;
                }
            }
            if (!foundEnding) {
                for (let end of connectingEndings) {
                    if (remaining.endsWith(end) && remaining.length > end.length) {
                        foundEnding = end;
                        remaining = remaining.slice(0, -end.length);
                        break;
                    }
                }
            }

            let foundParticle = null;
            for (let p of allParticles) {
                if (remaining.endsWith(p) && remaining.length > p.length) {
                    foundParticle = p;
                    remaining = remaining.slice(0, -p.length);
                    break;
                }
            }

            if (remaining.length > 0) {
                const meta = getStemMeta(remaining);
                if (meta && (foundEnding || block === remaining)) {
                    result.push({ display: meta.dict, type: 'predicate', combiningStem: meta.combiningStem, isDict: true });
                } else {
                    result.push({ display: remaining, type: 'word', combiningStem: null, isDict: false });
                }
            }
            if (foundParticle) result.push({ display: foundParticle, type: 'particle', combiningStem: null, isDict: false });
            if (foundEnding) result.push({ display: foundEnding, type: 'ending', combiningStem: null, isDict: false });

            return result.filter(s => s.display.length > 0);
        }

        function splitMergedBlock(block) {
            if (manualBlockParse[block]) return [manualBlockParse[block].stem, manualBlockParse[block].ending];
            const endings = ['습니다', 'ㅂ니다', '으며', '며'];
            for (let end of endings) {
                if (block.endsWith(end) && block.length > end.length) {
                    return [block.slice(0, -end.length), end];
                }
            }
            const particles = ['는', '은', '가', '이', '를', '을', '도', '고', '으로', '로', '에', '에서'];
            for (let p of particles) {
                if (block.endsWith(p) && block.length > p.length) {
                    return [block.slice(0, -p.length), p];
                }
            }
            return [block];
        }

        let taskOrder = [];
        let currentOrderIndex = 0;
        let builtBlocks = [];
        let availableElements = [];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initTaskOrder() {
            taskOrder = Array.from({ length: tasks.length }, (_, i) => i);
            taskOrder = shuffleArray(taskOrder);
            currentOrderIndex = 0;
        }

        function getCurrentTask() { return tasks[taskOrder[currentOrderIndex]]; }

        const buildArea = document.getElementById('buildArea');
        const elementsPanel = document.getElementById('elementsPanel');
        const russianTarget = document.getElementById('russianTarget');
        const progressDisplay = document.getElementById('progressDisplay');
        const feedbackDiv = document.getElementById('feedbackMessage');
        const playHintBtn = document.getElementById('playHintBtn');
        const resetBtn = document.getElementById('resetBtn');
        const checkBtn = document.getElementById('checkBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function getBlockClass(block) {
            if (block.isCombined) return 'mosaic-block combined';
            if (block.isDict) return 'mosaic-block dict-form';
            return 'mosaic-block';
        }
        function getElementClass(el) {
            if (el.type === 'predicate') return 'infinitive-chip';
            if (el.type === 'ending') return 'ending-chip';
            if (el.type === 'particle') return 'particle-chip';
            return '';
        }

        function renderBuildArea() {
            buildArea.innerHTML = '';
            builtBlocks.forEach((block, idx) => {
                const div = document.createElement('div');
                div.className = getBlockClass(block);
                div.textContent = block.display;
                div.setAttribute('data-index', idx);
                div.addEventListener('click', () => returnBlockToElements(idx));
                buildArea.appendChild(div);
            });
        }

        function renderElementsPanel() {
            elementsPanel.innerHTML = '';
            availableElements.forEach((el, idx) => {
                const chip = document.createElement('div');
                chip.className = 'element-chip ' + getElementClass(el);
                chip.textContent = el.display;
                chip.setAttribute('data-index', idx);
                chip.addEventListener('click', () => handleElementClick(idx));
                elementsPanel.appendChild(chip);
            });
        }

        function handleElementClick(elementIndex) {
            if (elementIndex < 0 || elementIndex >= availableElements.length) return;
            const el = availableElements[elementIndex];

            if (el.type === 'ending') {
                let attached = false;
                for (let i = builtBlocks.length - 1; i >= 0; i--) {
                    const block = builtBlocks[i];
                    if (block.isCombined) continue;
                    if (el.display === 'ㅂ니다' || el.display === '습니다') {
                        if (block.isDict && !block.isCombined) {
                            if (canAttachEnding(block.combiningStem, el.display)) {
                                block.display = attachFinalEnding(block.combiningStem, el.display);
                                block.isDict = false; block.isCombined = true; block.combiningStem = null;
                                attached = true; break;
                            } else {
                                showFeedback('❌ Это окончание не подходит к данной основе.', false);
                                return;
                            }
                        }
                    } else if (el.display === '며' || el.display === '으며') {
                        if ((block.isDict || block.type === 'word') && !block.isCombined) {
                            const stem = block.isDict ? block.combiningStem : block.display;
                            if (canAttachEnding(stem, el.display)) {
                                block.display = stem + el.display;
                                block.isDict = false; block.isCombined = true;
                                if (block.isDict) block.combiningStem = null;
                                attached = true; break;
                            } else {
                                showFeedback('❌ Это окончание не подходит к данной основе.', false);
                                return;
                            }
                        }
                    }
                }
                if (!attached) addElementToBuild(elementIndex);
                else { renderBuildArea(); renderElementsPanel(); clearFeedback(); }
            } else if (el.type === 'particle') {
                let attached = false;
                if (builtBlocks.length > 0) {
                    const last = builtBlocks[builtBlocks.length - 1];
                    if (last.type === 'word' && !last.isDict && !last.isCombined) {
                        last.display += el.display;
                        last.isCombined = true;
                        availableElements.splice(elementIndex, 1);
                        attached = true;
                    }
                }
                if (!attached) addElementToBuild(elementIndex);
                else { renderBuildArea(); renderElementsPanel(); clearFeedback(); }
            } else {
                addElementToBuild(elementIndex);
            }
        }

        function addElementToBuild(elementIndex) {
            if (elementIndex < 0 || elementIndex >= availableElements.length) return;
            const el = availableElements.splice(elementIndex, 1)[0];
            builtBlocks.push({
                display: el.display,
                type: el.type,
                combiningStem: el.combiningStem,
                isDict: el.isDict || false,
                isCombined: false,
            });
            renderBuildArea(); renderElementsPanel(); clearFeedback();
        }

        function returnBlockToElements(index) {
            if (index < 0 || index >= builtBlocks.length) return;
            const removed = builtBlocks.splice(index, 1)[0];
            if (removed.isCombined) {
                const parts = splitMergedBlock(removed.display);
                parts.forEach(p => {
                    if (isEnding(p)) {
                        availableElements.push({ display: p, type: 'ending', combiningStem: null, isDict: false });
                    } else if (isParticle(p)) {
                        availableElements.push({ display: p, type: 'particle', combiningStem: null, isDict: false });
                    } else {
                        const meta = getStemMeta(p);
                        if (meta) {
                            availableElements.push({ display: meta.dict, type: 'predicate', combiningStem: meta.combiningStem, isDict: true });
                        } else {
                            availableElements.push({ display: p, type: 'word', combiningStem: null, isDict: false });
                        }
                    }
                });
            } else {
                availableElements.push({
                    display: removed.display,
                    type: removed.type,
                    combiningStem: removed.combiningStem,
                    isDict: removed.isDict || false,
                });
            }
            availableElements = shuffleArray(availableElements);
            renderBuildArea(); renderElementsPanel(); clearFeedback();
        }

        function resetBuild() { loadCurrentTask(); }

        function checkAnswer() {
            const task = getCurrentTask();
            const solutionStr = task.solution.join('');
            const builtStr = builtBlocks.map(b => b.display).join('');
            if (solutionStr === builtStr) {
                showFeedback('✅ Отлично! Всё верно.', true);
                return true;
            } else {
                showFeedback('❌ Пока не совпадает. Попробуйте другую комбинацию.', false);
                return false;
            }
        }

        function showFeedback(msg, isCorrect) {
            feedbackDiv.style.display = 'block';
            feedbackDiv.textContent = msg;
            feedbackDiv.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
            if (!isCorrect && msg.includes('не подходит')) {
                setTimeout(() => { if (feedbackDiv.textContent === msg) feedbackDiv.style.display = 'none'; }, 2000);
            }
        }
        function clearFeedback() { feedbackDiv.style.display = 'none'; }

        function loadCurrentTask() {
            const task = getCurrentTask();
            russianTarget.textContent = task.ru;
            progressDisplay.textContent = `${currentOrderIndex + 1} / ${tasks.length}`;
            availableElements = shuffleArray(tokenizeSolution(task.solution));
            builtBlocks = [];
            renderBuildArea(); renderElementsPanel(); clearFeedback();
        }

        function navigateToNext() {
            if (currentOrderIndex < tasks.length - 1) { currentOrderIndex++; loadCurrentTask(); }
        }
        function navigateToPrev() {
            if (currentOrderIndex > 0) { currentOrderIndex--; loadCurrentTask(); }
        }

        function speakHint() {
            const task = getCurrentTask();
            const fullSentence = task.solution.join(' ');
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(fullSentence);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.4;
                utterance.pitch = 1.0;
                const voices = speechSynthesis.getVoices();
                const koVoice = voices.find(v => v.lang.startsWith('ko'));
                if (koVoice) utterance.voice = koVoice;
                speechSynthesis.speak(utterance);
            }
        }

        playHintBtn.addEventListener('click', speakHint);
        resetBtn.addEventListener('click', resetBuild);
        checkBtn.addEventListener('click', () => { if (checkAnswer()) setTimeout(navigateToNext, 900); });
        prevBtn.addEventListener('click', navigateToPrev);
        nextBtn.addEventListener('click', navigateToNext);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); navigateToPrev(); }
            else if (e.key === 'ArrowRight' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); navigateToNext(); }
            else if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); if (checkAnswer()) setTimeout(navigateToNext, 900); }
            else if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); resetBuild(); }
        });

        initTaskOrder();
        loadCurrentTask();
    })();
</script>
</body>
</html>
